name: Issue → Inbox

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write
  models: read

jobs:
  process-issue:
    if: contains(github.event.issue.labels.*.name, 'daily-words')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Write inbox file from issue body
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          mkdir -p inbox
          DATE=$(date -u +%Y-%m-%d)
          FILE="inbox/${DATE}-issue-${ISSUE_NUMBER}.md"
          # Write body verbatim; process.py handles "_No response_" placeholders
          printf '%s\n' "$ISSUE_BODY" > "$FILE"
          echo "Wrote $FILE:"
          cat "$FILE"
          echo "INBOX_FILE=$FILE" >> "$GITHUB_ENV"

      - name: Run AI processor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_MODEL: openai/gpt-4o-mini
        run: python3 scripts/process.py

      - name: Commit & push results
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/ inbox/
            git commit -m "chore: process issue #${{ github.event.issue.number }} [skip ci]"
            git push
            echo "COMMITTED=1" >> "$GITHUB_ENV"
          else
            echo "No changes to commit."
          fi

      - name: Comment & close the issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const committed = process.env.COMMITTED === '1';
            const body = committed
              ? `✅ Processed and merged into [\`data/\`](../tree/main/data). Thanks!`
              : `ℹ️ Nothing new to add — every word you submitted was either empty or already in the dataset.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number, body
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number, state: 'closed'
            });
